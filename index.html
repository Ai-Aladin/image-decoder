<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Decoder</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f3f3f3;
    margin:0;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}
h1{
    text-align:center;
}
textarea{
    width:100%;
    height:260px;
    border-radius:12px;
    border:1px solid #ccc;
    padding:10px;
    font-size:14px;
    resize:vertical;
}
.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
button{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}
.upload{background:#ff9800;color:white;}
.decode{background:#28a745;color:white;}
.save{background:#007bff;color:white;}
.clear{background:#dc3545;color:white;}

#preview{
    margin-top:25px;
    text-align:center;
}
#preview img{
    max-width:100%;
    border-radius:10px;
    border:2px solid #ddd;
}
#message{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Image Decoder</h1>

<p>কোড paste করুন অথবা TXT file upload করুন</p>

<textarea id="codeBox"
placeholder="Paste image code here..."></textarea>

<div class="buttons">

<input
type="file"
id="fileInput"
accept=".txt"
style="display:none"
>

<button class="upload"
onclick="document.getElementById('fileInput').click()">
Open TXT File
</button>

<button class="decode"
onclick="decodeImage()">
Decode Image
</button>

<button class="save"
onclick="saveImage()">
Save Image
</button>

<button class="clear"
onclick="clearAll()">
Clear
</button>

</div>

<div id="message"></div>
<div id="preview"></div>

</div>

<script>

let decodedImage = null;

document
.getElementById('fileInput')
.addEventListener('change', function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(ev){
document.getElementById(
'codeBox'
).value = ev.target.result;
};

reader.readAsText(file);

});

function showMessage(msg,color){

const el =
document.getElementById(
'message'
);

el.innerText = msg;
el.style.color = color;

}

function hexToBytes(hex){

hex = hex.replace(/\s/g,'');

const bytes = [];

for(let c=0;c<hex.length;c+=2){

bytes.push(
parseInt(
hex.substr(c,2),
16
)
);

}

return new Uint8Array(bytes);

}

function bytesToBlobURL(bytes){

const blob =
new Blob(
[bytes]
);

return URL.createObjectURL(
blob
);

}

function decodeImage(){

const raw =
document
.getElementById(
'codeBox'
)
.value;

if(!raw.trim()){

showMessage(
'আগে কোড paste করুন',
'red'
);

return;
}

try{

let imageURL = null;

if(
raw.includes('base64,')
||
raw.match(/^[A-Za-z0-9+/=\s]+$/)
){

let cleaned = raw;

if(cleaned.includes(
'base64,'
)){

cleaned =
cleaned.split(
'base64,'
)[1];

}

cleaned =
cleaned.replace(
/\s/g,
''
);

imageURL =
'data:image/jpeg;base64,'
+
cleaned;

}

else{

const encoder =
new TextEncoder();

const binary =
encoder.encode(raw);

let start = -1;
let end = -1;

for(
let i=0;
i<binary.length-1;
i++
){

if(
binary[i]===255
&&
binary[i+1]===216
){

start=i;
break;

}

}

for(
let i=
binary.length-2;
i>=0;
i--
){

if(
binary[i]===255
&&
binary[i+1]===217
){

end=i+2;
break;

}

}

if(
start!==-1
&&
end!==-1
){

const imgBytes =
binary.slice(
start,
end
);

imageURL =
bytesToBlobURL(
imgBytes
);

}

}

if(!imageURL){

throw Error();

}

const img =
new Image();

img.onload =
function(){

decodedImage =
imageURL;

document
.getElementById(
'preview'
)
.innerHTML =
`<img src="${imageURL}">`;

showMessage(
'ছবি সফলভাবে decode হয়েছে!',
'green'
);

};

img.onerror =
function(){

showMessage(
'Valid image পাওয়া যায়নি',
'red'
);

};

img.src =
imageURL;

}
catch(e){

showMessage(
'Decode failed',
'red'
);

}

}

function saveImage(){

if(!decodedImage){

showMessage(
'আগে image decode করুন',
'red'
);

return;

}

const a =
document.createElement(
'a'
);

a.href =
decodedImage;

a.download =
'decoded-image.jpg';

a.click();

}

function clearAll(){

document
.getElementById(
'codeBox'
).value='';

document
.getElementById(
'preview'
).innerHTML='';

document
.getElementById(
'message'
).innerHTML='';

decodedImage=null;

}

</script>

</body>
</html>
