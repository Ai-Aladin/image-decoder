<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Decoder</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:#f3f4f6;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.12);
}

h1{
text-align:center;
margin-bottom:10px;
}

.description{
text-align:center;
color:#555;
margin-bottom:20px;
}

textarea{
width:100%;
height:220px;
padding:12px;
font-size:14px;
border-radius:12px;
border:1px solid #ccc;
resize:vertical;
outline:none;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:15px;
}

button{
border:none;
padding:12px 18px;
border-radius:10px;
font-size:15px;
cursor:pointer;
font-weight:bold;
}

.upload{
background:#f59e0b;
color:white;
}

.decode{
background:#22c55e;
color:white;
}

.save{
background:#2563eb;
color:white;
}

.clear{
background:#ef4444;
color:white;
}

#message{
margin-top:15px;
font-weight:bold;
font-size:16px;
}

#preview{
margin-top:25px;
text-align:center;
}

#preview img{
max-width:100%;
border-radius:14px;
border:2px solid #ddd;
}
</style>
</head>
<body>

<div class="container">

<h1>Image Decoder</h1>

<p class="description">
Upload a TXT file or paste image code to decode an image
</p>

<textarea
id="codeBox"
placeholder="Paste image code here..."
></textarea>

<div class="buttons">

<input
type="file"
id="fileInput"
accept=".txt"
style="display:none"
>

<button
class="upload"
onclick="document.getElementById('fileInput').click()"
>
Upload TXT File
</button>

<button
class="decode"
onclick="decodeImage()"
>
Decode Image
</button>

<button
class="save"
onclick="saveImage()"
>
Save Image
</button>

<button
class="clear"
onclick="clearAll()"
>
Clear
</button>

</div>

<div id="message"></div>

<div id="preview"></div>

</div>

<script>

let currentImageBlob = null;
let currentImageURL = null;

document
.getElementById("fileInput")
.addEventListener("change", function(e){

const file = e.target.files[0];

if(!file){
return;
}

const reader = new FileReader();

reader.onload = function(event){

window.uploadedBinary =
new Uint8Array(event.target.result);

showMessage(
"TXT file loaded successfully",
"green"
);

};

reader.readAsArrayBuffer(file);

});

function showMessage(text,color){

const msg =
document.getElementById("message");

msg.innerText = text;
msg.style.color = color;

}

function decodeImage(){

try{

let imageBlob = null;

/* FILE MODE */

if(window.uploadedBinary){

const bytes =
window.uploadedBinary;

let start = -1;
let end = -1;

/* JPEG */

for(let i=0;i<bytes.length-1;i++){

if(
bytes[i]===255
&&
bytes[i+1]===216
){
start=i;
break;
}

}

for(
let i=bytes.length-2;
i>=0;
i--
){

if(
bytes[i]===255
&&
bytes[i+1]===217
){
end=i+2;
break;
}

}

if(
start!==-1
&&
end!==-1
){

const imgBytes =
bytes.slice(start,end);

imageBlob =
new Blob(
[imgBytes],
{
type:"image/jpeg"
}
);

}

}

/* PASTE MODE */

if(!imageBlob){

const raw =
document
.getElementById(
"codeBox"
)
.value
.trim();

if(!raw){

showMessage(
"Please upload a TXT file or paste image code",
"red"
);

return;

}

let cleaned = raw;

if(cleaned.includes("base64,")){

cleaned =
cleaned.split(
"base64,"
)[1];

}

cleaned =
cleaned.replace(
/\s/g,
""
);

currentImageURL =
"data:image/jpeg;base64," +
cleaned;

renderImage(
currentImageURL
);

return;

}

currentImageBlob =
imageBlob;

currentImageURL =
URL.createObjectURL(
imageBlob
);

renderImage(
currentImageURL
);

}
catch(error){

showMessage(
"Image decoding failed",
"red"
);

}

}

function renderImage(url){

const img =
new Image();

img.onload =
function(){

document
.getElementById(
"preview"
)
.innerHTML =
`<img src="${url}">`;

showMessage(
"Image decoded successfully",
"green"
);

};

img.onerror =
function(){

showMessage(
"Invalid image code or file",
"red"
);

};

img.src =
url;

}

function saveImage(){

if(!currentImageURL){

showMessage(
"Please decode an image first",
"red"
);

return;

}

const a =
document.createElement(
"a"
);

a.href =
currentImageURL;

a.download =
"decoded-image.jpg";

a.click();

}

function clearAll(){

document
.getElementById(
"codeBox"
)
.value="";

document
.getElementById(
"preview"
)
.innerHTML="";

document
.getElementById(
"message"
)
.innerHTML="";

window.uploadedBinary =
null;

currentImageBlob =
null;

currentImageURL =
null;

}

</script>

</body>
</html>
