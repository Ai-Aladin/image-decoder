<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Image Decoder</title>

<style>
*{
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
font-size:16px;
}

textarea{
width:100%;
height:260px;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
font-size:14px;
resize:vertical;
}

.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

button{
border:none;
padding:12px 18px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.upload{
background:#ff9800;
color:white;
}

.decode{
background:#28a745;
color:white;
}

.save{
background:#007bff;
color:white;
}

.clear{
background:#dc3545;
color:white;
}

#message{
margin-top:15px;
font-weight:bold;
font-size:16px;
}

#preview{
margin-top:25px;
text-align:center;
}

#preview img{
max-width:100%;
border-radius:12px;
border:2px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<h1>🖼️ Image Decoder</h1>

<p>কোড Paste করুন অথবা TXT File Upload করুন</p>

<textarea
id="codeBox"
placeholder="এখানে code paste করুন..."
></textarea>

<div class="buttons">

<input
type="file"
id="fileInput"
accept=".txt"
style="display:none"
/>

<button
class="upload"
onclick="document.getElementById('fileInput').click()"
>
TXT File খুলুন
</button>

<button
class="decode"
onclick="decodeImage()"
>
Decode করুন
</button>

<button
class="save"
onclick="saveImage()"
>
ছবি Save করুন
</button>

<button
class="clear"
onclick="clearAll()"
>
Clear
</button>

</div>

<div id="message"></div>

<div id="preview"></div>

</div>

<script>

let currentImageURL = null;

document
.getElementById("fileInput")
.addEventListener("change", function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

document
.getElementById("codeBox")
.value = event.target.result;

showMessage(
"TXT file load হয়েছে",
"green"
);

};

reader.readAsText(
file,
"latin1"
);

});

function showMessage(text,color){

const msg =
document.getElementById(
"message"
);

msg.innerText = text;
msg.style.color = color;

}

function decodeImage(){

const rawText =
document
.getElementById(
"codeBox"
)
.value;

if(!rawText.trim()){

showMessage(
"আগে code paste করুন",
"red"
);

return;

}

try{

let imageURL = null;

/* Base64 detect */

const cleaned =
rawText.trim();

if(
cleaned.includes("base64,")
||
/^[A-Za-z0-9+/=\s]+$/
.test(cleaned)
){

let b64 = cleaned;

if(
b64.includes(
"base64,"
)
){
b64 =
b64.split(
"base64,"
)[1];
}

b64 =
b64.replace(
/\s/g,
""
);

imageURL =
"data:image/jpeg;base64," +
b64;

}

/* Raw JPEG detect */

if(!imageURL){

const bytes = [];

for(
let i=0;
i<rawText.length;
i++
){

bytes.push(
rawText.charCodeAt(i)
& 0xff
);

}

let start = -1;
let end = -1;

for(
let i=0;
i<bytes.length-1;
i++
){

if(
bytes[i]===255
&&
bytes[i+1]===216
){

start = i;
break;

}

}

for(
let i=
bytes.length-2;
i>=0;
i--
){

if(
bytes[i]===255
&&
bytes[i+1]===217
){

end = i+2;
break;

}

}

if(
start !== -1
&&
end !== -1
){

const imgBytes =
new Uint8Array(
bytes.slice(
start,
end
)
);

const blob =
new Blob(
[imgBytes],
{
type:"image/jpeg"
}
);

imageURL =
URL.createObjectURL(
blob
);

}

}

if(!imageURL){

showMessage(
"ছবির code পাওয়া যায়নি",
"red"
);

return;

}

const img =
new Image();

img.onload =
function(){

currentImageURL =
imageURL;

document
.getElementById(
"preview"
)
.innerHTML =
`<img src="${imageURL}">`;

showMessage(
"ছবি সফলভাবে decode হয়েছে",
"green"
);

};

img.onerror =
function(){

showMessage(
"Valid image পাওয়া যায়নি",
"red"
);

};

img.src =
imageURL;

}
catch(error){

showMessage(
"Decode failed",
"red"
);

}

}

function saveImage(){

if(
!currentImageURL
){

showMessage(
"আগে image decode করুন",
"red"
);

return;

}

const a =
document.createElement(
"a"
);

a.href =
currentImageURL;

a.download =
"decoded-image.jpg";

a.click();

}

function clearAll(){

document
.getElementById(
"codeBox"
)
.value = "";

document
.getElementById(
"preview"
)
.innerHTML = "";

document
.getElementById(
"message"
)
.innerHTML = "";

currentImageURL =
null;

}

</script>

</body>
</html>
